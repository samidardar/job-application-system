services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: postulio-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: standard
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: postulio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: postulio-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://postulio.onrender.com
      - key: ENVIRONMENT
        value: production
      - key: STORAGE_PATH
        value: /app/storage
    disk:
      name: storage
      mountPath: /app/storage
      sizeGB: 10
    healthCheckPath: /health

  # ── Celery Worker ──────────────────────────────────────────────────────────
  - type: worker
    name: postulio-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: standard
    startCommand: celery -A worker.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: postulio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: postulio-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: postulio-backend
          envVarKey: SECRET_KEY
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STORAGE_PATH
        value: /app/storage
    disk:
      name: worker-storage
      mountPath: /app/storage
      sizeGB: 10

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: postulio-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    plan: starter
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: postulio-backend
          property: host
      - key: NODE_ENV
        value: production

databases:
  - name: postulio-db
    databaseName: postulio
    user: postulio
    plan: standard

  - name: postulio-redis
    plan: starter
